<!-- sidebar.html — replace existing -->
<nav class="sidebar">
  <div class="sidebar-brand">🎓 ExamENS</div>
  <div class="sidebar-role">{{ auth.userRole() | titlecase }}</div>

  <ul class="sidebar-nav">
    @for (link of links(); track link.path) {
      <li>
        <a [routerLink]="link.path" routerLinkActive="active">{{ link.label }}</a>
      </li>
    }
  </ul>

  <!-- Dark mode toggle -->
  <button class="sidebar-theme" (click)="theme.toggle()">
    {{ theme.darkMode() ? '☀️ Mode clair' : '🌙 Mode sombre' }}
  </button>

  <button class="sidebar-logout" (click)="auth.logout()">🚪 Déconnexion</button>
</nav>
